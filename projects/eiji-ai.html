<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capy AI Terminal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* --- THE NEON PINK PALETTE --- */
            --bg-color: #2b0a1a;        /* Deep dark magenta background */
            --panel-bg: #4a152c;        /* Dark pink panel */
            --text-main: #ffe6f2;       /* Very pale pink text */
            --retro-light-pink: #ffb3d9;/* Soft pastel pink for Capy */
            --retro-hot-pink: #ff007f;  /* Bright neon hot pink */
            --retro-magenta: #d10056;   /* Deep magenta for Player 1 */
            --border-dark: #240010;     /* Almost black-pink for borders */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Subtle retro grid */
            background-image: linear-gradient(rgba(255,255,255,0.03) 2px, transparent 2px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 2px, transparent 2px);
            background-size: 30px 30px;
            cursor: url('https://labs.phaser.io/assets/sprites/hand.png'), auto;
        }

        button, input { cursor: url('https://labs.phaser.io/assets/sprites/cursor.png'), pointer !important; }

        /* BACK BUTTON */
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: var(--panel-bg); color: var(--text-main);
            padding: 10px 15px; text-decoration: none; font-size: 0.6rem;
            border: 4px solid var(--border-dark);
            box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s;
        }
        .back-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--border-dark); }

        /* MAIN TERMINAL CONTAINER */
        .terminal-container {
            width: 100%; max-width: 800px; height: 85vh;
            background: var(--panel-bg); border: 4px solid var(--border-dark);
            box-shadow: 10px 10px 0px var(--border-dark);
            display: flex; flex-direction: column;
        }

        /* TERMINAL HEADER */
        .terminal-header {
            background: var(--retro-magenta); padding: 20px;
            border-bottom: 4px solid var(--border-dark);
            display: flex; justify-content: space-between; align-items: center;
        }
        .terminal-header h1 { font-size: 1rem; color: #fff; text-shadow: 2px 2px 0px var(--border-dark); margin: 0; }
        
        /* NEON PINK STATUS BLINKER */
        .status-light {
            width: 15px; height: 15px; background: var(--retro-hot-pink);
            border: 2px solid var(--border-dark); border-radius: 50%;
            box-shadow: 0 0 10px var(--retro-hot-pink);
            animation: blink 2s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* CHAT BOX AREA */
        .chat-box {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }
        
        /* Custom Pink Scrollbar */
        .chat-box::-webkit-scrollbar { width: 12px; }
        .chat-box::-webkit-scrollbar-track { background: var(--bg-color); border-left: 4px solid var(--border-dark); }
        .chat-box::-webkit-scrollbar-thumb { background: var(--retro-hot-pink); border: 2px solid var(--border-dark); }

        /* MESSAGES */
        .message {
            max-width: 80%; padding: 15px; font-size: 0.7rem; line-height: 1.6;
            border: 4px solid var(--border-dark); position: relative;
        }
        
        .msg-capy {
            background: var(--retro-light-pink); color: #000; align-self: flex-start;
            box-shadow: 6px 6px 0px var(--retro-hot-pink);
            border-bottom-left-radius: 0; 
        }
        .msg-capy::before { content: "CAPY"; display: block; font-size: 0.5rem; color: var(--retro-hot-pink); margin-bottom: 8px; text-shadow: 1px 1px 0 #000; }

        .msg-user {
            background: var(--retro-magenta); color: #fff; align-self: flex-end;
            box-shadow: -6px 6px 0px var(--border-dark);
            border-bottom-right-radius: 0;
        }
        .msg-user::before { content: "PLAYER 1"; display: block; font-size: 0.5rem; color: #fff; margin-bottom: 8px; text-shadow: 1px 1px 0 #000; }

        /* TYPING INDICATOR */
        .typing-indicator { font-size: 0.6rem; color: var(--retro-light-pink); align-self: flex-start; display: none; margin-left: 10px; }

        /* INPUT AREA */
        .input-area {
            display: flex; padding: 20px; background: var(--bg-color);
            border-top: 4px solid var(--border-dark); gap: 10px;
        }
        .input-area input {
            flex: 1; padding: 15px; font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem; background: #fff; color: #000;
            border: 4px solid var(--border-dark); outline: none;
        }
        .input-area input:focus { border-color: var(--retro-hot-pink); }
        
        .input-area button {
            background: var(--retro-hot-pink); color: #fff; padding: 0 20px;
            font-family: 'Press Start 2P', cursive; font-size: 0.8rem;
            border: 4px solid var(--border-dark); box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s;
        }
        .input-area button:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--border-dark); }

        @media (max-width: 768px) {
            .terminal-container { height: 90vh; border-width: 2px; }
            .message { max-width: 95%; font-size: 0.6rem; }
            .input-area { flex-direction: column; }
            .input-area button { padding: 15px; }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">◀ RETURN</a>

    <div class="terminal-container">
        <div class="terminal-header">
            <h1><i class="fas fa-robot"></i> CAPY OS v1.0</h1>
            <div class="status-light" title="System Online"></div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message msg-capy">Hello Player 1! I am Capy, Jon Lewyn's personal AI assistant. What would you like to know about his projects or skills?</div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">Capy is typing...</div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="COMMAND HERE..." autocomplete="off">
            <button id="sendBtn">SEND</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Capy's Memory Array
        let conversationHistory = [
            { 
                role: "system", 
                content: "You are Capy, the helpful AI assistant of Jon Lewyn, an Electronics Engineering student. Keep your answers brief, retro, and arcade-themed." 
            }
        ];

        // Function to create message bubbles
        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'msg-user' : 'msg-capy');
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Main sending function
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = ''; 
            
            // Save user message to memory
            conversationHistory.push({ role: "user", content: text });
            
            typingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            // ==========================================
            // PUT YOUR SECURE API KEY HERE
            // ==========================================
            const API_KEY = "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"; 
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        // Using the upgraded, highly capable Llama 3.3 model
                        model: "llama-3.3-70b-versatile", 
                        messages: conversationHistory 
                    })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';

                // Robust Error Check - Prints exact error to the chat screen
                if (!response.ok) {
                    console.error("Groq Error Details:", data);
                    addMessage(`GROQ ERROR: ${data.error?.message || 'Unknown API issue'}`, 'capy');
                    conversationHistory.pop(); // Remove the failed message so user can try again
                    return; 
                }

                // Show AI response
                let capyResponse = data.choices[0].message.content;
                addMessage(capyResponse, 'capy');

                // Save AI response to memory
                conversationHistory.push({ role: "assistant", content: capyResponse });

            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessage("SYSTEM ERROR: Total network failure. Check console.", 'capy');
                console.error("Network Error:", error);
            }
        }

        // Trigger send on "Enter" key
        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleSend();
        });

        // Trigger send on button click
        sendBtn.addEventListener('click', handleSend);
    </script>

</body>
</html>
