<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapySave | Virtual Wallet Monitor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #1e1e2f;
            --panel-bg: #2a2a40;
            --text-main: #f8f8f2;
            --text-muted: #a8a8b2;
            --retro-green: #4ade80;
            --retro-blue: #3b82f6;
            --retro-purple: #bd93f9;
            --retro-pink: #ff79c6;
            --retro-gold: #facc15;
            --border-dark: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1.2rem;
            line-height: 1.6;
            padding: 20px;
            background-image: linear-gradient(rgba(255,255,255,0.03) 2px, transparent 2px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            cursor: url('https://labs.phaser.io/assets/sprites/hand.png'), auto;
        }

        a, button { cursor: pointer; }

        .back-btn {
            display: inline-block; margin-bottom: 20px;
            background: var(--panel-bg); color: var(--text-main);
            padding: 10px 15px; text-decoration: none; 
            font-family: 'Press Start 2P', cursive; font-size: 0.6rem;
            border: 4px solid var(--border-dark); box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s;
        }
        .back-btn:hover { background: var(--retro-blue); }
        .back-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--border-dark); }

        .app-container {
            max-width: 1000px; margin: 0 auto;
            background: var(--panel-bg); border: 6px solid var(--border-dark);
            box-shadow: 12px 12px 0px var(--border-dark); padding: 30px;
        }

        /* --- HEADER --- */
        header { text-align: center; border-bottom: 4px dashed var(--border-dark); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 1.8rem; color: var(--retro-gold); text-shadow: 4px 4px 0px var(--border-dark); margin-bottom: 10px; }
        .subtitle { color: var(--retro-green); font-size: 1.2rem; }

        /* --- DASHBOARD BALANCES --- */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .wallet-card {
            background: #1e1e2f; border: 4px solid var(--border-dark);
            padding: 20px; text-align: center; box-shadow: 6px 6px 0px var(--border-dark);
        }
        .wallet-card.total { border-color: var(--retro-purple); box-shadow: 6px 6px 0px var(--retro-purple); }
        .wallet-card.gcash { border-color: var(--retro-blue); box-shadow: 6px 6px 0px var(--retro-blue); }
        .wallet-card.maya { border-color: var(--retro-green); box-shadow: 6px 6px 0px var(--retro-green); }
        
        .wallet-card h3 { font-family: 'Press Start 2P', cursive; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 15px; }
        .wallet-card .amount { font-size: 2.2rem; font-weight: bold; color: #fff; }

        /* --- MAIN LAYOUT GRIDS --- */
        .main-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; margin-bottom: 30px;}
        .bottom-content { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        
        @media (max-width: 768px) { 
            .main-content, .bottom-content { grid-template-columns: 1fr; } 
        }

        /* --- FORM SECTION --- */
        .form-section { background: rgba(0,0,0,0.2); border: 4px solid var(--border-dark); padding: 20px; }
        .form-section h2 { font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: var(--retro-pink); margin-bottom: 20px; border-bottom: 2px solid var(--border-dark); padding-bottom: 10px;}
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-family: 'Press Start 2P', cursive; font-size: 0.5rem; color: var(--retro-gold); margin-bottom: 8px; }
        
        input, select {
            width: 100%; padding: 12px; font-family: 'VT323', monospace; font-size: 1.2rem;
            background: var(--bg-color); color: var(--text-main);
            border: 4px solid var(--border-dark); outline: none;
        }
        input:focus, select:focus { border-color: var(--retro-pink); }

        .btn-submit {
            width: 100%; background: var(--retro-pink); color: #fff;
            padding: 15px; border: 4px solid var(--border-dark); box-shadow: 4px 4px 0px var(--border-dark);
            font-family: 'Press Start 2P', cursive; font-size: 0.7rem; text-transform: uppercase;
            margin-top: 10px; transition: all 0.1s; cursor: pointer;
        }
        .btn-submit:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--border-dark); }

        /* --- TRANSACTION LIST & RESET --- */
        .history-section { background: rgba(0,0,0,0.2); border: 4px solid var(--border-dark); padding: 20px; display: flex; flex-direction: column;}
        .history-section h2 { font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: var(--retro-blue); margin-bottom: 20px; border-bottom: 2px solid var(--border-dark); padding-bottom: 10px;}
        
        #transaction-list { list-style: none; height: 280px; overflow-y: auto; padding-right: 10px; margin-bottom: 15px;}
        
        #transaction-list::-webkit-scrollbar { width: 8px; }
        #transaction-list::-webkit-scrollbar-thumb { background: var(--border-dark); }

        .tx-item {
            background: var(--panel-bg); border: 2px solid var(--border-dark);
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center;
        }
        .tx-info h4 { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; color: #fff; margin-bottom: 5px; }
        .tx-info p { font-size: 0.9rem; color: var(--text-muted); }
        
        .tx-amount { font-family: 'Press Start 2P', cursive; font-size: 0.7rem; }
        .tx-amount.income { color: var(--retro-green); }
        .tx-amount.expense { color: var(--retro-pink); }

        .platform-badge {
            display: inline-block; padding: 2px 6px; font-size: 0.8rem; border: 1px solid var(--border-dark); margin-right: 8px;
        }
        .badge-gcash { background: var(--retro-blue); color: #fff; }
        .badge-maya { background: var(--retro-green); color: #000; }
        
        .empty-state { text-align: center; color: var(--text-muted); margin-top: 50px; font-size: 1.5rem;}

        .btn-reset {
            width: 100%; background: transparent; color: var(--retro-pink);
            padding: 10px; border: 2px dashed var(--retro-pink);
            font-family: 'Press Start 2P', cursive; font-size: 0.6rem; text-transform: uppercase;
            margin-top: auto; transition: all 0.2s; cursor: pointer;
        }
        .btn-reset:hover { background: var(--retro-pink); color: #fff; }

        /* --- AI ADVISOR SECTION --- */
        .ai-section {
            background: #000; border: 4px solid var(--retro-green); padding: 20px;
            box-shadow: inset 0 0 15px rgba(74, 222, 128, 0.2), 6px 6px 0px var(--border-dark);
            display: flex; flex-direction: column;
        }
        .ai-header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
            border-bottom: 2px dashed var(--retro-green); padding-bottom: 10px; margin-bottom: 15px;
        }
        .ai-header h2 { font-family: 'Press Start 2P', cursive; font-size: 0.7rem; color: var(--retro-green); margin: 0;}
        
        .btn-analyze {
            background: var(--retro-green); color: #000; border: 2px solid var(--retro-green);
            padding: 8px 12px; font-family: 'Press Start 2P', cursive; font-size: 0.5rem;
            transition: all 0.2s; cursor: pointer;
        }
        .btn-analyze:hover { background: #000; color: var(--retro-green); }
        .btn-analyze:active { transform: translateY(2px); }

        .ai-terminal {
            flex-grow: 1; color: var(--retro-green); font-size: 1.2rem; line-height: 1.5;
            text-shadow: 0 0 5px rgba(74, 222, 128, 0.5); overflow-y: auto; max-height: 250px;
        }
        .cursor { display: inline-block; width: 10px; height: 15px; background: var(--retro-green); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 5px;}

        /* --- CHART VISUALIZER SECTION --- */
        .visualizer-section {
            background: rgba(0,0,0,0.2); border: 4px solid var(--border-dark); padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .visualizer-section h2 { 
            font-family: 'Press Start 2P', cursive; font-size: 0.7rem; color: var(--retro-gold); 
            margin-bottom: 20px; border-bottom: 2px solid var(--border-dark); padding-bottom: 10px; width: 100%; text-align: left;
        }
        .chart-container {
            position: relative; width: 100%; max-width: 250px; height: 250px;
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">◀ RETURN TO PORTFOLIO</a>

    <div class="app-container">
        <header>
            <h1><i class="fas fa-coins"></i> CAPYSAVE</h1>
            <div class="subtitle">Virtual Wealth Terminal v3.0 (Visualizer Active)</div>
        </header>

        <div class="dashboard">
            <div class="wallet-card total">
                <h3>NET WORTH</h3>
                <div class="amount" id="total-balance">₱0.00</div>
            </div>
            <div class="wallet-card gcash">
                <h3>GCASH</h3>
                <div class="amount" id="gcash-balance">₱0.00</div>
            </div>
            <div class="wallet-card maya">
                <h3>MAYA</h3>
                <div class="amount" id="maya-balance">₱0.00</div>
            </div>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2>LOG DATA</h2>
                <form id="tx-form">
                    <div class="form-group">
                        <label>TYPE</label>
                        <select id="tx-type" required>
                            <option value="expense">EXPENSE (-)</option>
                            <option value="income">INCOME (+)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>PLATFORM</label>
                        <select id="tx-platform" required>
                            <option value="GCash">GCash</option>
                            <option value="Maya">Maya</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>AMOUNT (₱)</label>
                        <input type="number" id="tx-amount" min="1" step="0.01" placeholder="e.g. 500" required>
                    </div>
                    <div class="form-group">
                        <label>DESCRIPTION (Category)</label>
                        <input type="text" id="tx-desc" placeholder="e.g. Food, Bills, Games..." required autocomplete="off">
                    </div>
                    <button type="submit" class="btn-submit">SAVE ENTRY</button>
                </form>
            </div>

            <div class="history-section">
                <h2>SYSTEM LOGS</h2>
                <ul id="transaction-list"></ul>
                <button id="btn-reset" class="btn-reset"><i class="fas fa-trash-alt"></i> PURGE ALL DATA</button>
            </div>
        </div>

        <div class="bottom-content">
            <div class="ai-section">
                <div class="ai-header">
                    <h2><i class="fas fa-robot"></i> CAPY-AI CO-PROCESSOR</h2>
                    <button class="btn-analyze" id="btn-analyze">ANALYZE LOGS</button>
                </div>
                <div class="ai-terminal">
                    <span id="ai-output">> Awaiting manual trigger for financial diagnostic...</span><span class="cursor"></span>
                </div>
            </div>

            <div class="visualizer-section">
                <h2><i class="fas fa-chart-pie"></i> EXPENSE RADAR</h2>
                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ INSERT YOUR API KEY HERE ⚠️
        const GROQ_API_KEY = "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"; 

        // --- 1. CORE ENGINE ---
        let transactions = JSON.parse(localStorage.getItem('capysave-data')) || [];

        const form = document.getElementById('tx-form');
        const list = document.getElementById('transaction-list');
        const gcashDisplay = document.getElementById('gcash-balance');
        const mayaDisplay = document.getElementById('maya-balance');
        const totalDisplay = document.getElementById('total-balance');
        
        const aiOutput = document.getElementById('ai-output');
        const btnAnalyze = document.getElementById('btn-analyze');
        const btnReset = document.getElementById('btn-reset');
        let typeWriterTimeout;

        const formatMoney = (amount) => {
            return '₱' + amount.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        // --- 2. CHART.JS INITIALIZATION ---
        // Configure global retro fonts for Chart.js
        Chart.defaults.font.family = "'Press Start 2P', cursive";
        Chart.defaults.color = "#a8a8b2";

        const ctx = document.getElementById('expenseChart').getContext('2d');
        let expenseChart = new Chart(ctx, {
            type: 'doughnut', // 'pie' or 'doughnut' look best
            data: {
                labels: ['No Data'],
                datasets: [{
                    data: [1],
                    backgroundColor: ['#2a2a40'], // Empty state color
                    borderColor: '#000000',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }, // Hiding legend to save space
                    tooltip: {
                        backgroundColor: '#1e1e2f',
                        titleFont: { size: 10, family: "'Press Start 2P', cursive" },
                        bodyFont: { size: 14, family: "'VT323', monospace" },
                        borderColor: '#bd93f9',
                        borderWidth: 2,
                        padding: 10
                    }
                }
            }
        });

        // Function to process data and redraw chart
        function updateChart() {
            const expenseData = {};
            let hasExpenses = false;

            // Group all expenses by their Description
            transactions.forEach(tx => {
                if (tx.type === 'expense') {
                    hasExpenses = true;
                    const category = tx.desc.toUpperCase(); // Normalize names (Food == FOOD)
                    expenseData[category] = (expenseData[category] || 0) + parseFloat(tx.amount);
                }
            });

            if (!hasExpenses) {
                // Reset to empty state
                expenseChart.data.labels = ['No Data'];
                expenseChart.data.datasets[0].data = [1];
                expenseChart.data.datasets[0].backgroundColor = ['#2a2a40'];
                expenseChart.update();
                return;
            }

            // Apply Retro Cyberpunk Colors
            const retroColors = ['#ff79c6', '#bd93f9', '#3b82f6', '#4ade80', '#facc15', '#ff5555'];
            
            expenseChart.data.labels = Object.keys(expenseData);
            expenseChart.data.datasets[0].data = Object.values(expenseData);
            expenseChart.data.datasets[0].backgroundColor = retroColors;
            expenseChart.update();
        }

        // --- 3. UI UPDATES ---
        function updateDashboard() {
            let gcashTotal = 0;
            let mayaTotal = 0;

            transactions.forEach(tx => {
                const amount = parseFloat(tx.amount);
                if (tx.platform === 'GCash') {
                    tx.type === 'income' ? gcashTotal += amount : gcashTotal -= amount;
                } else if (tx.platform === 'Maya') {
                    tx.type === 'income' ? mayaTotal += amount : mayaTotal -= amount;
                }
            });

            if(gcashTotal < 0) gcashTotal = 0;
            if(mayaTotal < 0) mayaTotal = 0;

            const netWorth = gcashTotal + mayaTotal;

            gcashDisplay.textContent = formatMoney(gcashTotal);
            mayaDisplay.textContent = formatMoney(mayaTotal);
            totalDisplay.textContent = formatMoney(netWorth);
        }

        function renderList() {
            list.innerHTML = '';
            if (transactions.length === 0) {
                list.innerHTML = '<div class="empty-state">No data logs found.</div>';
                return;
            }

            [...transactions].reverse().forEach(tx => {
                const li = document.createElement('li');
                li.className = 'tx-item';
                const badgeClass = tx.platform === 'GCash' ? 'badge-gcash' : 'badge-maya';
                const sign = tx.type === 'income' ? '+' : '-';
                const amountClass = tx.type === 'income' ? 'income' : 'expense';

                li.innerHTML = `
                    <div class="tx-info">
                        <h4>${tx.desc}</h4>
                        <p><span class="platform-badge ${badgeClass}">${tx.platform}</span> ${tx.date}</p>
                    </div>
                    <div class="tx-amount ${amountClass}">
                        ${sign}${formatMoney(parseFloat(tx.amount))}
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // --- 4. EVENT LISTENERS ---
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.getElementById('tx-type').value;
            const platform = document.getElementById('tx-platform').value;
            const amount = document.getElementById('tx-amount').value;
            const desc = document.getElementById('tx-desc').value;
            const dateStr = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            const newTx = { id: Date.now(), type, platform, amount, desc, date: dateStr };
            transactions.push(newTx);
            localStorage.setItem('capysave-data', JSON.stringify(transactions));

            updateDashboard();
            renderList();
            updateChart(); // Trigger chart update!

            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-desc').value = '';
            
            typeWriter("> New data logged. Radar updated.");
        });

        btnReset.addEventListener('click', function() {
            const confirmPurge = confirm("CRITICAL WARNING: This will permanently wipe all financial records. Are you sure you want to proceed?");
            if (confirmPurge) {
                transactions = [];
                localStorage.removeItem('capysave-data');
                updateDashboard();
                renderList();
                updateChart(); // Reset chart to empty
                typeWriter("> Memory wiped successfully. System restored to factory settings.");
            }
        });

        function typeWriter(text) {
            clearTimeout(typeWriterTimeout);
            aiOutput.textContent = "";
            let i = 0;
            function type() {
                if (i < text.length) {
                    aiOutput.textContent += text.charAt(i);
                    i++;
                    typeWriterTimeout = setTimeout(type, 30); 
                }
            }
            type();
        }

        // --- 5. GROQ AI LOGIC INTEGRATION ---
        async function runAIAnalysis() {
            btnAnalyze.disabled = true;
            btnAnalyze.style.opacity = '0.5';

            if (transactions.length === 0) {
                typeWriter("> ERROR: Insufficient data. Please log income and expenses to generate a financial profile.");
                btnAnalyze.disabled = false;
                btnAnalyze.style.opacity = '1';
                return;
            }

            if (GROQ_API_KEY === "YOUR_GROQ_API_KEY_HERE") {
                typeWriter("> ERROR: Groq API Key missing. Neural connection offline.");
                btnAnalyze.disabled = false;
                btnAnalyze.style.opacity = '1';
                return;
            }

            typeWriter("> Booting Capy-AI Neural Net... Establishing connection to Groq Servers...");

            let totalIncome = 0;
            let totalExpense = 0;
            let topExpense = { desc: 'None', amount: 0 };

            transactions.forEach(tx => {
                const amt = parseFloat(tx.amount);
                if (tx.type === 'income') {
                    totalIncome += amt;
                } else {
                    totalExpense += amt;
                    if (amt > topExpense.amount) {
                        topExpense = { desc: tx.desc, amount: amt };
                    }
                }
            });

            const systemPrompt = `You are Capy-AI, a cyberpunk-themed financial advisor embedded in a retro web terminal. 
            Your job is to look at the user's financial data and give them ONE specific piece of actionable advice on what to do about their financial situation. 
            Keep your response under 3 sentences. Be analytical and direct. Do NOT use markdown or bullet points.`;

            const userPrompt = `Financial Data Analysis Request:
            Total Income: ₱${totalIncome}
            Total Expense: ₱${totalExpense}
            Highest Single Expense: ${topExpense.desc} costing ₱${topExpense.amount}.
            Please provide a diagnostic and a recommendation on what I should do next.`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 150 
                    })
                });

                if (!response.ok) {
                    throw new Error("API Connection Failed");
                }

                const data = await response.json();
                
                if (data.choices && data.choices.length > 0) {
                    const aiResponse = data.choices[0].message.content;
                    typeWriter("> " + aiResponse); 
                }

            } catch (error) {
                console.error("AI Error:", error);
                typeWriter("> ERROR: Failed to connect to Groq neural pathways. Check console for details.");
            }

            btnAnalyze.disabled = false;
            btnAnalyze.style.opacity = '1';
        }

        btnAnalyze.addEventListener('click', runAIAnalysis);

        // --- 6. INIT ---
        updateDashboard();
        renderList();
        updateChart(); // Initialize chart on page load
    </script>
</body>
</html>
