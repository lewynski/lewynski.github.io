<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Arcade Quiz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #050510;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* CRT Scanline Effect */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            cursor: url('https://labs.phaser.io/assets/sprites/cursor.png'), pointer;
        }

        .game-container {
            width: 90%;
            max-width: 600px;
            background: #1e1e2f;
            border: 4px solid #3b82f6;
            box-shadow: 8px 8px 0px #bd93f9;
            padding: 30px;
            position: relative;
        }

        h1 { font-size: 1.2rem; color: #f1fa8c; margin-bottom: 20px; text-shadow: 3px 3px 0px #000; line-height: 1.5; }
        p { font-size: 0.7rem; color: #a8a8b2; margin-bottom: 30px; line-height: 1.8; }

        .high-score { font-size: 0.6rem; color: #ff79c6; margin-bottom: 20px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn {
            display: block; width: 100%;
            background: #4a152c; color: #fff;
            border: 4px solid #000;
            padding: 15px; margin-bottom: 15px;
            font-family: 'Press Start 2P', cursive; font-size: 0.7rem;
            cursor: inherit; transition: all 0.1s;
            box-shadow: 4px 4px 0px #000;
        }
        
        .btn:hover { background: #ff007f; transform: translateY(-2px); }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
        
        .btn.correct { background: #4ade80; color: #000; }
        .btn.wrong { background: #d10056; }

        #quiz-screen, #result-screen { display: none; }

        .hud { display: flex; justify-content: space-between; font-size: 0.6rem; color: #4ade80; margin-bottom: 20px; border-bottom: 4px solid #000; padding-bottom: 10px;}

    </style>
</head>
<body>

    <div class="game-container">
        <div id="start-screen">
            <h1>MLBB<br>KNOWLEDGE TEST</h1>
            <div class="high-score">CURRENT CHAMP: EGOIST EIJI</div>
            <p>Test your macro knowledge. Get ready for the draft phase.</p>
            <button class="btn" onclick="startQuiz()">INSERT COIN (START)</button>
        </div>

        <div id="quiz-screen">
            <div class="hud">
                <span id="score-tracker">SCORE: 0</span>
                <span id="question-tracker">Q: 1/5</span>
            </div>
            <h1 id="question-text">Question goes here?</h1>
            <div id="options-grid">
                </div>
        </div>

        <div id="result-screen">
            <h1>MATCH OVER</h1>
            <p id="final-score">YOUR SCORE: 0/5</p>
            <p id="rank-text" style="color: #ff79c6; margin-bottom: 30px; font-size: 0.8rem;">RANK: WARRIOR</p>
            <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const quizData = [
            { question: "Who is known as the 'Son of Flames'?", options: ["Valir", "Gord", "X.Borg", "Thamuz"], answer: 0 },
            { question: "Which role typically holds the EXP Lane?", options: ["Mage", "Marksman", "Fighter", "Support"], answer: 2 },
            { question: "What is the maximum level a hero can reach in a match?", options: ["Level 12", "Level 15", "Level 18", "Level 20"], answer: 1 },
            { question: "Which item reduces enemy HP regeneration?", options: ["Blade of Despair", "Dominance Ice", "Bloodlust Axe", "Athena's Shield"], answer: 1 },
            { question: "Who is the brother of Gusion?", options: ["Alucard", "Granger", "Aamon", "Tigreal"], answer: 2 }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const scoreTracker = document.getElementById('score-tracker');
        const questionTracker = document.getElementById('question-tracker');

        function startQuiz() {
            startScreen.style.display = 'none';
            quizScreen.style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            // Reset state
            optionsGrid.innerHTML = '';
            
            const currentQ = quizData[currentQuestionIndex];
            questionText.innerText = currentQ.question;
            questionTracker.innerText = `Q: ${currentQuestionIndex + 1}/${quizData.length}`;

            currentQ.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.innerText = option;
                btn.classList.add('btn');
                btn.onclick = () => selectAnswer(index, btn);
                optionsGrid.appendChild(btn);
            });
        }

        function selectAnswer(selectedIndex, selectedBtn) {
            const currentQ = quizData[currentQuestionIndex];
            const allBtns = optionsGrid.children;

            // Disable all buttons after click
            for(let i = 0; i < allBtns.length; i++) {
                allBtns[i].disabled = true;
                if(i === currentQ.answer) {
                    allBtns[i].classList.add('correct');
                }
            }

            if (selectedIndex === currentQ.answer) {
                score++;
                scoreTracker.innerText = `SCORE: ${score * 100}`;
            } else {
                selectedBtn.classList.add('wrong');
            }

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1200); // 1.2 second delay before next question
        }

        function showResults() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            
            document.getElementById('final-score').innerText = `YOUR SCORE: ${score * 100}`;
            
            let rank = "WARRIOR";
            if(score === 5) rank = "MYTHICAL GLORY";
            else if(score >= 4) rank = "LEGEND";
            else if(score >= 3) rank = "EPIC";
            else if(score >= 2) rank = "GRANDMASTER";
            
            document.getElementById('rank-text').innerText = `RANK ACHIEVED:\n\n${rank}`;
        }
    </script>
</body>
</html>
