<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jon Lewyn | Certifications</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #1e1e2f;
            --panel-bg: #2a2a40;
            --text-main: #f8f8f2;
            --text-muted: #a8a8b2;
            --retro-green: #4ade80;
            --retro-blue: #3b82f6;
            --retro-purple: #bd93f9;
            --retro-pink: #ff79c6;
            --retro-gold: #facc15;
            --border-dark: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            cursor: url('https://labs.phaser.io/assets/sprites/hand.png'), auto;
            background-image: linear-gradient(rgba(255,255,255,0.03) 2px, transparent 2px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 2px, transparent 2px);
            background-size: 30px 30px;
            padding: 40px 20px;
            min-height: 100vh;
        }

        a, button { cursor: url('https://labs.phaser.io/assets/sprites/cursor.png'), pointer !important; }

        /* --- BACK BUTTON --- */
        .back-btn {
            display: inline-block; position: absolute; top: 30px; left: 30px;
            background: var(--panel-bg); color: var(--text-main);
            padding: 15px 20px; text-decoration: none; font-size: 0.7rem;
            border: 4px solid var(--border-dark);
            box-shadow: 6px 6px 0px var(--border-dark);
            transition: all 0.1s;
        }
        .back-btn:hover { background: var(--retro-blue); }
        .back-btn:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px var(--border-dark); }

        /* --- PAGE HEADER --- */
        .page-header { text-align: center; margin-bottom: 60px; margin-top: 50px; }
        .page-header h1 { 
            font-size: 1.8rem; color: var(--retro-gold); 
            text-shadow: 4px 4px 0px var(--border-dark); margin-bottom: 15px; line-height: 1.5;
        }
        .page-header p { font-size: 0.65rem; color: var(--text-muted); max-width: 800px; margin: 0 auto; line-height: 2; }

        /* --- GALLERY GRID --- */
        .gallery-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; max-width: 1200px; margin: 0 auto;
        }

        /* --- CERTIFICATE CARDS --- */
        .cert-card {
            background: var(--panel-bg);
            border: 6px solid var(--border-dark);
            padding: 20px;
            width: 100%; max-width: 500px;
            box-shadow: 10px 10px 0px var(--border-dark);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        /* Neon Glow Effect on Hover */
        .cert-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0px 0px 25px var(--retro-purple), 10px 10px 0px var(--border-dark);
            border-color: var(--retro-purple);
        }

        .cert-image {
            width: 100%;
            height: auto;
            border: 4px solid var(--border-dark);
            display: block;
            margin-bottom: 20px;
            background: #000; /* Placeholder background if image fails */
        }

        .cert-info { text-align: center; }
        .cert-info h3 { font-size: 0.8rem; color: var(--retro-green); margin-bottom: 10px; line-height: 1.4; }
        .cert-info p { font-size: 0.6rem; color: var(--text-muted); }

        /* Pin icon to make it look like it's pinned to a board */
        .pin {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 30px; background: var(--retro-pink);
            border: 4px solid var(--border-dark); border-radius: 50%;
            box-shadow: 2px 2px 0px var(--border-dark); z-index: 2;
        }

        @media (max-width: 768px) {
            .back-btn { position: static; display: block; width: max-content; margin: 0 auto 30px auto; }
            .page-header { margin-top: 0; }
            .page-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">◀ RETURN TO BASE</a>

    <div class="page-header">
        <h1><i class="fas fa-trophy"></i> ACHIEVEMENT ARCHIVE</h1>
        <p>A collection of verified credentials, course completions, and official documentation.</p>
    </div>

    <div class="gallery-container">
        
        <div class="cert-card">
            <div class="pin"></div>
            <img src="cert1.png" alt="Certificate 1" class="cert-image">
            <div class="cert-info">
                <h3>CERTIFICATE TITLE 1</h3>
                <p>Issued by: [Institution Name]</p>
            </div>
        </div>

        <div class="cert-card">
            <div class="pin"></div>
            <img src="cert2.png" alt="Certificate 2" class="cert-image">
            <div class="cert-info">
                <h3>CERTIFICATE TITLE 2</h3>
                <p>Issued by: [Institution Name]</p>
            </div>
        </div>

    </div>

</body>
</html>
